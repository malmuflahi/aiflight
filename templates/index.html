<!DOCTYPE html>
<html>
<head>
    <title>AIFLight | AI Price Defense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="hero">
    <nav>
        <div class="logo">AIFLight</div>
        <div class="pill">AI vs Airline Pricing AI</div>
    </nav>

    <h1>Beat airline price swings before you book.</h1>
    <p>
        AIFLight helps you track the right route, compare booking sites, avoid bad timing,
        and decide when to buy or wait.
    </p>

    <div class="trust">
        <span>No booking fees</span>
        <span>Compare before buying</span>
        <span>Google • Kayak • Skyscanner</span>
    </div>
</header>

<main>
    <section class="search-card">
        <h2>Start a price-defense search</h2>

        <form id="searchForm">
            <div class="grid">
                <input id="origin" value="JFK" placeholder="From: JFK or New York">
                <input id="destination" value="Cairo" placeholder="To: Cairo, Egypt, DXB">
            </div>

            <select id="tripType">
                <option value="oneway">One way</option>
                <option value="roundtrip">Round trip</option>
            </select>

            <div class="grid">
                <label>Departure date
                    <input id="departDate" type="date">
                </label>
                <label>Return date
                    <input id="returnDate" type="date">
                </label>
            </div>

            <div class="passengers">
                <label>Adults <input id="adults" type="number" min="1" value="1"></label>
                <label>Children <input id="children" type="number" min="0" value="0"></label>
                <label>Infants <input id="infants" type="number" min="0" value="0"></label>
            </div>

            <select id="priority">
                <option value="balanced">Best price defense</option>
                <option value="cheapest">Cheapest hunt</option>
                <option value="fastest">Fastest route</option>
                <option value="comfort">Low-stress family trip</option>
            </select>

            <textarea id="preference">I want the cheapest smart option, but I do not want a terrible layover.</textarea>

            <button type="submit">Run AI Price Defense</button>
        </form>
    </section>

    <section id="status"></section>
    <section id="strategy"></section>
    <section id="results" class="results"></section>
</main>

<script src="/static/script.js"></script>
</body>
</html>
