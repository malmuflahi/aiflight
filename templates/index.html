<!DOCTYPE html>
<html>
<head>
    <title>AI Flight Search</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>AI Flight Search</h1>
    <p class="subtitle">AI compares price, time, comfort, and value — then explains the smartest choice.</p>

    <form id="searchForm">
        <input id="from" placeholder="From: JFK" value="JFK">
        <input id="to" placeholder="To: LAX" value="LAX">

        <select id="priority">
            <option value="balanced">Best overall</option>
            <option value="cheapest">Cheapest</option>
            <option value="fastest">Fastest, money not important</option>
            <option value="comfort">Comfort: fewer stops</option>
        </select>

        <button type="submit">Search Flights</button>
    </form>

    <div id="results"></div>

    <script src="/static/script.js"></script>
</body>
</html>
